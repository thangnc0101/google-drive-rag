server:
  host: "${SERVER_HOST:0.0.0.0}"
  port: "${SERVER_PORT:8000}"
  workers: "${SERVER_WORKERS:1}"

auth:
  username: "${AUTH_USERNAME:admin}"
  password: "${ADMIN_PASSWORD:changeme}"

namespaces:
  - name: "hr-docs"
    description: "HR documents"
    folder_ids:
      - "1ABC_hr_folder_id"

  - name: "engineering"
    description: "Engineering docs"
    folder_ids:
      - "2DEF_eng_folder_id"

google_drive:
  credentials_file: "${GOOGLE_CREDENTIALS_FILE:service-account.json}"
  poll_interval_seconds: "${GDRIVE_POLL_INTERVAL:300}"
  sync_on_startup: "${GDRIVE_SYNC_ON_STARTUP:true}"
  file_types:
    - "application/pdf"
    - "application/vnd.google-apps.document"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    - "text/plain"
    - "text/markdown"
  max_file_size_mb: "${GDRIVE_MAX_FILE_SIZE_MB:1}"

llm:
  base_url: "${LLM_BASE_URL:https://openrouter.ai/api/v1}"
  api_key: "${LLM_API_KEY}"
  enrichment_model: "${LLM_ENRICHMENT_MODEL:google/gemini-2.0-flash-001}"
  query_model: "${LLM_QUERY_MODEL:google/gemini-2.5-flash}"
  max_concurrent_requests: "${LLM_MAX_CONCURRENT:5}"

embedding:
  base_url: "${EMBEDDING_BASE_URL:https://openrouter.ai/api/v1}"
  api_key: "${EMBEDDING_API_KEY}"
  model: "${EMBEDDING_MODEL:openai/text-embedding-3-small}"
  dimensions: "${EMBEDDING_DIMENSIONS:512}"

chunking:
  max_chunk_tokens: "${CHUNK_MAX_TOKENS:512}"
  overlap_tokens: "${CHUNK_OVERLAP_TOKENS:50}"

retrieval:
  default_mode: "${RETRIEVAL_MODE:mix}"
  default_namespaces: []
  top_k: "${RETRIEVAL_TOP_K:5}"
  rrf_k: "${RETRIEVAL_RRF_K:60}"
  graph_traversal_depth: "${RETRIEVAL_GRAPH_DEPTH:2}"
  chunk_context_default_window: "${RETRIEVAL_CHUNK_WINDOW:2}"
  max_entity_tokens: "${RETRIEVAL_MAX_ENTITY_TOKENS:4000}"
  max_relation_tokens: "${RETRIEVAL_MAX_RELATION_TOKENS:4000}"
  max_total_tokens: "${RETRIEVAL_MAX_TOTAL_TOKENS:16000}"
  enable_community_search: "${RETRIEVAL_COMMUNITY_SEARCH:true}"
  enable_gleaning: "${RETRIEVAL_GLEANING:false}"
  enable_batch_contextual_enrichment: "${RETRIEVAL_BATCH_CONTEXTUAL:false}"
  batch_contextual_enrichment_size: "${RETRIEVAL_BATCH_CONTEXTUAL_SIZE:5}"
  enable_llm_summary: "${RETRIEVAL_LLM_SUMMARY:false}"
  llm_summary_min_descriptions: "${RETRIEVAL_SUMMARY_MIN_DESC:6}"
  show_references: "${RETRIEVAL_SHOW_REFERENCES:false}"
  query_response_markdown: "${RETRIEVAL_QUERY_RESPONSE_MARKDOWN:false}"

storage:
  data_dir: "${STORAGE_DATA_DIR:./data}"
